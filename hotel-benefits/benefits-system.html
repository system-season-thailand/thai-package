<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Thai Hotel Benefits Manager | Staff Dashboard</title>


    
    <link rel="stylesheet" href="benefits-system.css">



    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-title-wrap">
            <div class="header-top-actions">
                <button id="openAdminAccessBtn" class="btn-outline admin-access-toggle" type="button">
                    <i class="fas fa-lock"></i> Admin Access
                </button>
                <button id="openAllHotelsBtn" class="btn-outline admin-access-toggle" type="button">
                    <i class="fas fa-list-ul"></i> All Hotels
                </button>
            </div>
            <div id="adminAccessBox" class="admin-access-box" hidden>
                <div class="admin-access-panel">
                    <input id="adminPasswordInput" type="password" placeholder="Enter admin password">
                    <button id="applyAdminPasswordBtn" class="btn-primary" type="button">Apply Access</button>
                </div>
            </div>
            <h1><i class="fas fa-umbrella-beach"></i> Thai Hotel Benefits Manager</h1>
        </div>
        <div class="toolbar">
            <input id="hotelSearchInput" class="header-search-input" type="text" placeholder="Search hotels...">
            <button id="addHotelBtn" class="btn-primary"><i class="fas fa-plus-circle"></i> Add Hotel</button>
            <button id="saveAllBtn" class="btn-secondary"><i class="fas fa-save"></i> Save to Database</button>
        </div>
    </div>

    <div id="hotelsContainer" class="hotels-grid">
        <div class="loading-overlay"><i class="fas fa-spinner fa-pulse"></i> Loading hotels...</div>
    </div>
    <footer>
        <i class="fas fa-database"></i> Page End: <strong>Thai Hotel Benefits</strong>
    </footer>
</div>

<button id="backToTopBtn" class="back-to-top-btn" type="button" aria-label="Back to top">
    <i class="fas fa-arrow-up"></i>
</button>





<script src="benefits-system.js"></script>



<!-- ========== SQL FOR SUPABASE (run in Supabase SQL Editor) ========== 
-- Table name: thai_hotel_benefits
CREATE TABLE IF NOT EXISTS thai_hotel_benefits (
    id SERIAL PRIMARY KEY,
    hotel_name TEXT NOT NULL,
    benefits TEXT[] NOT NULL DEFAULT '{}',
    created_at TIMESTAMPTZ DEFAULT now(),
    updated_at TIMESTAMPTZ DEFAULT now()
);
-->


</body>
</html>
